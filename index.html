s its own board and unique abilities."},{"ar":"ضع المباني الأولية على الكواكب الرئيسية.","en":"Place starting buildings on home planets."},{"ar":"رتّب بطاقات الجولات الست وأهداف النهاية.","en":"Set up the six round tiles and end-game objectives."},{"ar":"ابدأ بالتقنيات المجانية المحددة في لوح فريقك.","en":"Start with free technologies as shown on your faction board."}],"turn":{"ar":"اللاعبون يتناوبون في الأفعال حتى يمرر الجميع—ست جولات في المجموع.","en":"Players alternate actions until all pass—six rounds total."},"turnSteps":[{"ar":"١. ابنِ أو طوّر مبنى على كوكب تمتلكه.","en":"1. Build or upgrade a building on a planet you own."},{"ar":"٢. حوّل كوكباً إلى نوع كوكبك بدفع نقاط Gaia.","en":"2. Terraform a planet to your type by spending Gaia points."},{"ar":"٣. تقدّم في مسار تقنية بدفع الموارد.","en":"3. Advance on a technology track by spending resources."},{"ar":"٤. كوّن اتحاداً بربط مبانيك ببعضها.","en":"4. Form a federation by connecting your buildings."},{"ar":"٥. مرّر إذا لم تجد فعلاً مناسباً.","en":"5. Pass if you have no useful action."}],"buildings":[{"name":"المنجم Mine","ar":"أرخص مبنى—يسمح استخراج الموارد الأساسية.","en":"Cheapest building—enables basic resource extraction."},{"name":"محطة التداول Trading Station","ar":"تولّد عملات للشراء والتجارة.","en":"Generates credits for purchases and trading."},{"name":"مختبر الأبحاث Research Lab","ar":"يتيح التقدم في مسارات التقنية.","en":"Enables advancement on technology tracks."},{"name":"الأكاديمية Academy","ar":"تمنح قدرات خاصة لفريقك.","en":"Grants special abilities to your faction."},{"name":"معهد الكوكب Planetary Institute","ar":"القوة المحورية والأقوى في فريقك.","en":"Your faction's most powerful central building."}],"specialists":[{"name":"مسارات التقنية الستة","ar":"تحسينات في: التحويل، التنقل، الذكاء الاصطناعي، Gaia، الاقتصاد، البحث.","en":"Improvements in: Terraforming, Navigation, AI, Gaia, Economy, Research."},{"name":"الاتحادات","ar":"ربط مبانيك يمنحك رموز اتحاد قيّمة.","en":"Connecting buildings earns valuable federation tokens."},{"name":"أهداف الجولة","ar":"حقّق شرطاً محدداً في نهاية كل جولة لكسب نقاط.","en":"Fulfill a specific condition at end of each round to earn points."}],"endGame":{"ar":"بعد الجولة السادسة: نقاط أهداف النهاية + مسارات التقنية + الاتحادات + الموارد المتبقية. الأعلى يفوز.","en":"After round six: end-game objectives + technology tracks + federations + remaining resources. Highest wins."},"tips":[{"ar":"افهم قوة فريقك ومتى تستخدمها—هي مفتاح فوزك.","en":"Understand your faction's power and when to use it—it's your key to winning."},{"ar":"التوسع المبكر يضمن كواكب أكثر واتحادات أقوى.","en":"Early expansion secures more planets and stronger federations."},{"ar":"لا تُهمل مسارات التقنية—مصدر نقاط ضخم في النهاية.","en":"Don't neglect technology tracks—a massive point source at game end."}]},"Sheriff of Nottingham":{"overview":{"ar":"لعبة تفاوض وخداع لـ٣–٥ لاعبين—تجار يهرّبون بضائع عبر بوابة نوتنغهام بينما يحاول العمدة كشف الكاذبين.","en":"Negotiation and bluffing for 3–5 players—merchants smuggle goods through Nottingham's gate while the Sheriff catches liars."},"goal":{"ar":"جمع أكبر قدر من الذهب بتسليم البضائع وكسب مكافآت الملك والملكة.","en":"Accumulate the most gold by delivering goods and earning Royal bonuses."},"setup":[{"ar":"وزّع على كل لاعب يده الأولى من البطاقات وكيس البضاعة.","en":"Deal each player their starting hand and merchant bag."},{"ar":"ضع إمدادات الذهب في المنتصف.","en":"Place the coin supply in the center."},{"ar":"اختر أول لاعب يكون عمدة.","en":"Choose the first Sheriff."},{"ar":"حدد عدد الجولات وفق عدد اللاعبين.","en":"Determine round count based on player count."}],"turn":{"ar":"كل جولة: التجار يعبّئون أكياسهم ويُعلنون محتواها للعمدة الذي يقرر من يُفتَّش.","en":"Each round: merchants fill bags and declare contents to the Sheriff who decides whom to inspect."},"turnSteps":[{"ar":"١. كل تاجر يختار ١–٥ بطاقات ويضعها في كيسه.","en":"1. Each merchant chooses 1–5 cards and places them in their bag."},{"ar":"٢. كل تاجر يُعلن للعمدة نوع وكمية البضاعة—يحق الكذب.","en":"2. Each merchant declares bag contents to the Sheriff—lying allowed."},{"ar":"٣. العمدة يقرر من يُفتّش ومن يمر. الرشوة والتفاوض مسموحان.","en":"3. Sheriff decides who to inspect and who passes. Bribery and negotiation allowed."},{"ar":"٤. إذا كُشف الكذب: العمدة يأخذ المهرّب وتاجر يدفع غرامة.","en":"4. If lying caught: Sheriff takes contraband and merchant pays a fine."},{"ar":"٥. إذا لم يُكشف الكذب: بضاعة إلى المتجر وقد يُعوَّض التاجر.","en":"5. If not caught: goods to stall, merchant may receive compensation."},{"ar":"٦. ينتقل دور العمدة بعد جولتين.","en":"6. Sheriff role rotates every two rounds."}],"buildings":[{"name":"تفاح Apple","ar":"بضاعة شرعية—١ ذهب.","en":"Legal good—1 gold."},{"name":"جبن Cheese","ar":"بضاعة شرعية—٢ ذهب.","en":"Legal good—2 gold."},{"name":"خبز Bread","ar":"بضاعة شرعية—٣ ذهب.","en":"Legal good—3 gold."},{"name":"دجاج Chicken","ar":"بضاعة شرعية—٤ ذهب.","en":"Legal good—4 gold."},{"name":"بضائع مهرّبة Contraband","ar":"قيمة عالية لكن عقوبة الكشف أعلى.","en":"High value but steep penalty if caught."}],"specialists":[{"name":"مكافأة الملك والملكة","ar":"من يملك أكثر بضاعة من نوع واحد يحصل على مكافأة خاصة في النهاية.","en":"Most of a single good type earns a special Royal bonus at game end."},{"name":"الرشوة","ar":"أعطِ العمدة ذهباً لتجنب التفتيش—ملزم بقبوله.","en":"Pay the Sheriff gold to avoid inspection—they must accept."},{"name":"الصفقات السرية","ar":"اعقد اتفاقيات مع أي لاعب—لكنها غير ملزمة قانونياً.","en":"Make deals with any player—but none are legally binding."}],"endGame":{"ar":"بعد الجولات: قيمة بضاعة المتجر + مكافآت الملك والملكة + الذهب المتبقي. الأعلى يفوز.","en":"After all rounds: stall goods value + Royal bonuses + remaining gold. Highest wins."},"tips":[{"ar":"الكذب المحكم أجدى من الصدق دائماً—لكن لا تُبالغ.","en":"Calculated lying beats honesty—but don't overdo it."},{"ar":"تعلّم نمط لعب العمدة—كل شخص له طريقته الخاصة.","en":"Learn the Sheriff's playing style—everyone has a pattern."},{"ar":"الرشوة أداة قوية—وظّفها في اللحظة الحاسمة.","en":"Bribery is powerful—deploy it at the critical moment."}]},"Harmonies":{"overview":{"ar":"لعبة وضع رموز جمالية لـ٢–٤ لاعبين—ضع رموز الحيوانات والبيئات لإنشاء أنظمة بيئية منسجمة.","en":"An aesthetic token placement game for 2–4 players—place animal and habitat tokens to create harmonious ecosystems."},"goal":{"ar":"تحقيق أعلى نقاط بإنشاء موائل متكاملة تنسجم مع بطاقات الحيوانات.","en":"Score the most points by creating complete habitats matching animal card requirements."},"setup":[{"ar":"وزّع على كل لاعب لوح لعبه ورموز البداية.","en":"Give each player their game board and starting tokens."},{"ar":"ضع أكداس الرموز في المنتصف مصنّفةً حسب نوعها.","en":"Place token stacks in the center sorted by type."},{"ar":"اسحب بطاقات الحيوانات لتكوّن السوق.","en":"Draw animal cards to form the market."},{"ar":"حدد اللاعب البادئ عشوائياً.","en":"Determine the starting player randomly."}],"turn":{"ar":"خذ ثلاثة رموز من صف واحد ثم ضعها على لوحتك. يمكنك أيضاً أخذ بطاقة حيوان.","en":"Take three tokens from one row then place them on your board. Optionally take an animal card."},"turnSteps":[{"ar":"١. اختر صف رموز وخذ منه ثلاثة رموز.","en":"1. Choose a token row and take three tokens from it."},{"ar":"٢. ضع الرموز الثلاثة على لوحتك مراعياً قواعد الوضع.","en":"2. Place all three tokens on your board following placement rules."},{"ar":"٣. اختياري: خذ بطاقة حيوان من العرض.","en":"3. Optional: take an animal card from the display."},{"ar":"٤. لا يمكنك تجاوز الحد المسموح من كل نوع رمز.","en":"4. Don't exceed the allowed limit of each token type."}],"buildings":[{"name":"الجبال Mountains","ar":"تُشكّل المرتفعات في البيئات الطبيعية.","en":"Form elevated positions in natural habitats."},{"name":"الأشجار Trees","ar":"تُكوّن الغابات ومناطق الظل.","en":"Form forests and shaded areas."},{"name":"المياه Water","ar":"تصنع الأنهار والبحيرات.","en":"Create rivers and lakes."},{"name":"العشب Grass","ar":"تُشكّل السهول والمراعي.","en":"Form plains and meadows."},{"name":"الحجر Stone","ar":"تُكوّن الصخور والتضاريس الوعرة.","en":"Form rocks and rough terrain."}],"specialists":[{"name":"بطاقات الحيوانات","ar":"كل بطاقة تحدد نمطاً من الرموز يجب تحقيقه لكسب نقاطها.","en":"Each card specifies a token pattern that must be achieved to score its points."},{"name":"التناسق البيئي","ar":"رموز متجاورة من نوع واحد تُعطي نقاطاً إضافية.","en":"Adjacent tokens of the same type grant bonus points."}],"endGame":{"ar":"احسب: نقاط بطاقات الحيوانات + نقاط التناسق على لوحتك − نقاط الرموز الزائدة. الأعلى يفوز.","en":"Score: fulfilled animal cards + harmony points on board − excess token penalties. Highest wins."},"tips":[{"ar":"خطّط لتحقيق عدة بطاقات حيوانات بنفس مجموعة الرموز.","en":"Plan to fulfill multiple animal cards with the same tokens."},{"ar":"تجنّب تراكم رموز لا تحتاجها—ستُطرح من نقاطك.","en":"Avoid accumulating unneeded tokens—they subtract from your score."}]},"The Crew: Mission Deep Sea":{"overview":{"ar":"لعبة ورق تعاونية لـ٢–٥ لاعبين—العب الأوراق بالترتيب الصحيح لإتمام مهام غواصين في الأعماق.","en":"Cooperative trick-taking for 2–5 players—play cards correctly to complete submarine crew missions."},"goal":{"ar":"إتمام جميع مهام الرحلة المحددة في كتيب المهام.","en":"Complete all mission tasks specified in the mission booklet."},"setup":[{"ar":"وزّع الأوراق بالتساوي على جميع اللاعبين.","en":"Deal all cards evenly among players."},{"ar":"اقرأ المهمة وحدد الأهداف المطلوبة.","en":"Read the mission and identify required objectives."},{"ar":"وزّع بطاقات المهام على اللاعبين المناسبين.","en":"Distribute task cards to appropriate players."},{"ar":"من يحمل ورقة الغواصة يبدأ الجولة الأولى.","en":"The player with the Submarine card leads the first trick."}],"turn":{"ar":"اللاعبون يلعبون أوراقاً بدورهم حسب قواعد أخذ الأوراق—الفائز يبدأ الدور التالي.","en":"Players play cards in turn following trick-taking rules—winner leads the next trick."},"turnSteps":[{"ar":"١. اللاعب البادئ يضع ورقة تُحدد اللون المطلوب.","en":"1. Leading player plays a card setting the required color."},{"ar":"٢. كل لاعب يتبع بنفس اللون إن أمكن—وإلا يلعب أي ورقة.","en":"2. Each player follows with the same color if able, else plays any card."},{"ar":"٣. الأعلى في اللون المطلوب يأخذ الدور ويبدأ التالي.","en":"3. Highest card of the required color wins the trick and leads next."},{"ar":"٤. الأرقام السوداء (غواصات) تفوز على أي لون.","en":"4. Black cards (submarines) beat any color."},{"ar":"٥. تحقّق من إتمام مهامك بعد كل دور.","en":"5. Check if tasks were completed after each trick."}],"buildings":[{"name":"التواصل المحدود","ar":"مرة واحدة فقط: ضع ورقة أمامك مع رمز أفضل/وحيدة/أسوأ للإعلان عنها.","en":"Once only: place a card face-up with a best/only/worst token to communicate it."},{"name":"المهام المرتّبة","ar":"مهام يجب إتمامها بترتيب محدد.","en":"Tasks that must be completed in a specific order."},{"name":"الروكيت Rocket","ar":"الأعلى قيمة في اللعبة—يفوز على أي ورقة.","en":"Highest value in the game—beats any card."}],"specialists":[{"name":"إشارة التواصل","ar":"ضع ورقة مع رمز: أعلاها (أفضل)، أدناها (أسوأ)، جانبها (وحيدة من نوعها).","en":"Place a card with token: above (best), below (worst), beside (only of its color)."},{"name":"المهام الإلزامية","ar":"بعض المهام تشترط على لاعب بعينه أخذ ورقة بعينها.","en":"Some tasks require a specific player to win a specific card."}],"endGame":{"ar":"تنجح المجموعة بإتمام جميع المهام. تفشل إذا عجزت عن إتمام مهمة ضمن الأدوار المتاحة.","en":"The group succeeds by completing all tasks. Fails if unable to complete a task within available tricks."},"tips":[{"ar":"استخدم إشارة التواصل في اللحظة الحاسمة—وليس مبكراً.","en":"Use your communication signal at a critical moment—not early."},{"ar":"خطّط من البداية من يتولى أي مهمة بناءً على أوراقه.","en":"Plan from the start who handles which task based on their cards."}]},"Spyfall":{"overview":{"ar":"لعبة استنتاج اجتماعي لـ٣–٨ لاعبين—جميعهم يعرفون الموقع ما عدا الجاسوس الذي يحاول اكتشافه.","en":"Social deduction for 3–8 players—everyone knows the   var allNames = useMemo(function(){ return GAME_NAMES.concat(custom); }, [custom]);
  function getDB(name) { return BGG_DB[name] || customDB[name] || null; }

  // Fetch images
  useEffect(function() {
    var todo = allNames.filter(function(n) {
      var d = getDB(n);
      return d && d.bggId && !imgCache[n] && !d.imgEmbedded;
    });
    if (todo.length === 0) return;
    var total = todo.length, done = 0, i = 0, active = true;
    setImgProgress({ done:0, total:total });

    function next() {
      if (!active || i >= todo.length) { if (done >= total) setImgProgress(null); return; }
      var name = todo[i++];
      var d = getDB(name);
      fetchBGGImage(d.bggId).then(function(b64) {
        if (b64) {
          setImgCache(function(prev) {
            var updated = Object.assign({}, prev);
            updated[name] = b64;
            saveLS(IMG_KEY, updated);
            return updated;
          });
        }
        done++;
        setImgProgress(function(p) { return p ? { done: done, total: total } : null; });
        setTimeout(next, 150);
      }).catch(function() { done++; setTimeout(next, 150); });
    }
    // 4 concurrent fetchers with staggered start
    setTimeout(next, 500);
    setTimeout(next, 800);
    setTimeout(next, 1100);
    setTimeout(next, 1400);
    return function() { active = false; };
  }, []);

  function flash(msg) { setToast(msg); setTimeout(function(){ setToast(null); }, 3000); }

  function saveLend(name, form) {
    var next = Object.assign({}, lendData); next[name] = form;

    flash('✓ تم الحذف');
  }

                style: Object.assign({}, S.fBtn, on ? { background: d.color, color:'#fff', borderColor: d.color } : {}),
                onClick: function(){ setFDiff(on ? '' : d.ar); }
              }, d.ar);
            })
          )
        ),
        h('div', { style:{ height:1, background:'#2E2E2E' } }),

        // Weight
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' } },
          h('span', { style:{ fontSize:12, color:'#999999', fontWeight:600, minWidth:90 } }, 'مستوى التعقيد'),
          h('div', { style:{ display:'flex', gap:6, flexWrap:'wrap' } },
            weightLevels.map(function(w) {
              var on = fWeight === w.range;
              return h('button', { key: w.range,
                style: Object.assign({}, S.fBtn, on ? { background: w.color, color:'#fff', borderColor: w.color } : {}),
                onClick: function(){ setFWeight(on ? '' : w.range); }
              }, w.label);
            })
          )
        ),
        h('div', { style:{ height:1, background:'#2E2E2E' } }),

        // Categories
        h('div', { style:{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' } },
          h('span', { style:{ fontSize:12, color:'#999999', fontWeight:600, minWidth:90 } }, 'التصنيف'),
          h('div', { style:{ display:'flex', gap:5, flexWrap:'wrap' } },
            allCats.map(function(c) {
              var on = fCat === c;
              return h('button', { key:c,
                style: Object.assign({}, S.fBtn, { fontSize:11 }, on ? { background:'#2A2A2A', borderColor:'#888888', color:'#c9a84c' } : {}),
                onClick: function(){ setFCat(on ? '' : c); }
              }, c);
            })
          )
        ),

        hasFilter && h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:4 } },
          h('span', { style:{ fontSize:12, color:'#888888' } }, filtered.length + ' من ' + allNames.length + ' لعبة'),
          h('button', { style:{ background:'none', border:'1px solid #e74c3c55', borderRadius:8,
            padding:'6px 14px', color:'#e74c3c', cursor:'pointer', fontSize:12 },
            onClick: clearFilters }, 'مسح الفلاتر ✕')
        )
      )
    ),

    // Grid
    h('main', { style:{ maxWidth:1300, margin:'0 auto', padding:'8px 20px 48px' } },
      filtered.length === 0
        ? h('div', { style:{ textAlign:'center', color:'#888888', padding:60, fontSize:15 } }, 'لا توجد نتائج')
        : h('div', { style: S.grid },
            filtered.map(function(n) {
              var _bgg = getDB(n);
              var _img = (_bgg && _bgg.imgEmbedded) ? _bgg.imgEmbedded : (imgCache[n] || null);
              return h(GameCard, {
                key: n,
                name: n,
                bgg: _bgg,
                lend: lendData[n],
                imgUrl: _img,
                isCustom: custom.indexOf(n) >= 0,
                onLend:   function(){ setLending(n); },
                onDelete: function(){ deleteGame(n); },
                onRules:  function(){ setRulesGame(n); },
              });
            })
          )
    ),

    // Modals
    lending   && h(LendModal, { game:lending, lend:lendData[lending]||{},
      onSave: function(f){ saveLend(lending,f); }, onClose: function(){ setLending(null); } }),
    adding    && h(AddModal, { existing:allNames, onAdd:addGame, onClose:function(){setAdding(false);} }),
    rulesGame && h(RulesModal, { game:rulesGame, imgUrl:getImgUrl(rulesGame), onClose:function(){setRulesGame(null);} }),

    // Toast
    toast && h('div', { style: S.toast }, toast)
  );
}

function FilterRow(label, options, val, setVal, color) {
  return h('div', { style:{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' } },
    h('span', { style:{ fontSize:12, color:'#999999', fontWeight:600, minWidth:90 } }, label),
    h('div', { style:{ display:'flex', gap:6, flexWrap:'wrap' } },
      options.map(function(o) {
        var on = val === o;
        return h('button', { key:o,
          style: Object.assign({}, S.fBtn, on ? { background: color||'#c9a84c', color: color ? '#fff' : '#1A1A1A', borderColor: color||'#c9a84c' } : {}),
          onClick: function(){ setVal(on ? '' : o); }
        }, o);
      })
    )
  );
}

// ── BGG Image Fetcher ─────────────────────────────────────────────────────────
// ── BGG Image: get thumbnail URL ─────────────────────────────────────────────
async function fetchBGGImage(bggId) {
  if (!bggId) return null;
  // Try multiple independent proxies with delays between failures
  var bggUrl = 'https://boardgamegeek.com/xmlapi2/thing?id=' + bggId;
  var proxies = [
    'https://corsproxy.io/?' + encodeURIComponent(bggUrl),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(bggUrl),
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(bggUrl),
    'https://thingproxy.freeboard.io/fetch/' + bggUrl,
  ];
  for (var pi = 0; pi < proxies.length; pi++) {
    try {
      var res = await fetch(proxies[pi]);
      if (!res.ok) continue;
      var text = await res.text();
      var m = text.match(/<thumbnail>([^<]+)<\/thumbnail>/);
      if (m && m[1].trim()) {
        var url = m[1].trim();
        if (url.startsWith('//')) url = 'https:' + url;
        return url;
      }
    } catch(e) { continue; }
  }
  return null;
}
